version: "3.9"

services:
  app:
    container_name: api_business
    build:
      context: .
      dockerfile: Dockerfile
    stop_signal: SIGTERM
    volumes:
      - ./static:/home/static
    ports:
      - "8000:8000"
    env_file:
      - src/.env
    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - api_business_network

  pg:
    container_name: pg_api_business
    image: postgres:15
    environment:
      POSTGRES_DB: api_business
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d api_business"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - api_business_network

  pgadmin:
    container_name: pgadmin_api_business
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - pg
    networks:
      - api_business_network

  redis:
    container_name: redis_api_business
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - api_business_network

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus/config.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - api_business_network

  grafana:
    image: grafana/grafana:5.1.0
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    networks:
      - api_business_network

volumes:
  pg_data:

networks:
  api_business_network:
    driver: bridge
